<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="node" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="60%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2563eb" />
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0e1729" />
      <stop offset="100%" stop-color="#070b14" />
    </radialGradient>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)" />

  <!-- system links: three sources converging on one outcome -->
  <g stroke="#38bdf8" stroke-width="1.2" stroke-opacity="0.55" stroke-linecap="round">
    <line x1="16" y1="16" x2="8" y2="9" />
    <line x1="16" y1="16" x2="24" y2="9" />
    <line x1="16" y1="16" x2="16" y2="25" />
  </g>

  <!-- source nodes -->
  <g fill="#56b9f0">
    <circle cx="8" cy="9" r="2" />
    <circle cx="24" cy="9" r="2" />
    <circle cx="16" cy="25" r="2" />
  </g>

  <!-- central outcome node + soft glow -->
  <circle cx="16" cy="16" r="6.5" fill="url(#node)" fill-opacity="0.28" />
  <circle cx="16" cy="16" r="3.6" fill="url(#node)" />
</svg>
